<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagger & Die - Projector</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .target-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 64px;
        }
        .target-face {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* ── D20 face styling (from resources/d20_blank) ── */
        .highlight-zone .face-shape {
            fill: #2a1f3d;
            stroke: #8a7fa8;
            stroke-width: 1.5;
            stroke-linejoin: round;
            transition: fill 0.3s ease, stroke 0.3s ease, filter 0.3s ease;
        }
        .highlight-zone .face-shape.d20-face-center {
            fill: #3d2a5c;
        }
        .highlight-zone .face-shape.d20-face-outer {
            fill: #1e1630;
        }

        /* ── Rolled (active) state — gold glow ── */
        .highlight-zone.active .face-shape {
            fill: #ffd700;
            stroke: #b8960f;
            stroke-width: 2;
            filter: url(#glow-gold);
        }

        /* ── Claimed (hit) state — green glow ── */
        .highlight-zone.claimed .face-shape {
            fill: #2ecc71;
            stroke: #1a9c54;
            stroke-width: 2;
            filter: url(#glow-green);
        }
        /* ── Multi-hit (2+ rolls/hits on same section) — distinct from Aim (cyan) ── */
        .highlight-zone.multi-hit.active .face-shape {
            fill: #f59e0b;
            stroke: #d97706;
            stroke-width: 2.2;
            filter: url(#glow-amber);
        }
        .highlight-zone.multi-hit.claimed .face-shape {
            fill: #f97316;
            stroke: #ea580c;
            stroke-width: 2.2;
            filter: url(#glow-orange);
        }
        /* ── Triple-hit (3 rolls/hits on same section) — glowing red ── */
        .highlight-zone.triple-hit.active .face-shape {
            fill: #ef4444;
            stroke: #dc2626;
            stroke-width: 2.2;
            filter: url(#glow-red);
        }
        .highlight-zone.triple-hit.claimed .face-shape {
            fill: #ef4444;
            stroke: #dc2626;
            stroke-width: 2.2;
            filter: url(#glow-red);
        }
        .highlight-zone.aimed .face-shape {
            fill: #22d3ee;
            stroke: #0e7490;
            stroke-width: 2.2;
            filter: url(#glow-green);
            stroke-dasharray: 10 6;
        }
        .highlight-zone.aimed.claimed .face-shape {
            fill: #e879f9;
            stroke: #a21caf;
            filter: url(#glow-green);
            stroke-dasharray: 10 6;
        }

        /* ── Pulse animation for active zones ── */
        .highlight-zone.active .face-shape,
        .highlight-zone.multi-hit.active .face-shape,
        .highlight-zone.triple-hit.active .face-shape {
            animation: projectorPulse 1.5s ease-in-out infinite;
        }
        .highlight-zone.claimed .face-shape {
            animation: none;
        }
        .highlight-zone.aimed .face-shape {
            animation: none;
        }
        @keyframes projectorPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ── Connection status indicator ── */
        .status-dot {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ccc;
            border: 2px solid #999;
            transition: all 0.3s;
            z-index: 100;
        }
        .status-dot.connected {
            background: #2ecc71;
            border-color: #1a9c54;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }
        .status-dot.active {
            background: #ffd700;
            border-color: #b8960f;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .m3-logo {
            position: fixed; bottom: 10px; right: 10px; z-index: 50;
            width: 36px; height: auto; pointer-events: auto; cursor: pointer;
            opacity: 0.85;
        }
        .m3-logo:hover { opacity: 1; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: rgba(20,20,35,0.98);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 24px;
            min-width: 240px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .modal h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.1rem;
            color: #f0f0f0;
            margin-bottom: 16px;
        }
        .modal .btn-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal .btn {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.4);
            color: #ffd700;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal .btn:hover {
            background: rgba(255,215,0,0.3);
            border-color: rgba(255,215,0,0.7);
        }
        .modal .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
        }
        .modal .modal-close:hover { color: white; }
        .modal-wrap { position: relative; }

        /* Alignment mode */
        body.alignment-mode .target-wrapper {
            cursor: grab;
            pointer-events: auto;
            transform-origin: center center;
        }
        body.alignment-mode .target-wrapper:active { cursor: grabbing; }
        body.alignment-mode .target-wrapper * { pointer-events: none; }
        .alignment-hint {
            display: none;
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            font-family: sans-serif;
            font-size: 14px;
            color: #333;
            text-shadow: 0 0 4px rgba(255,255,255,0.9);
            z-index: 90;
            pointer-events: none;
        }
        body.alignment-mode .alignment-hint { display: block; }
        .alignment-lock-bar {
            display: none;
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.5);
            padding: 12px 20px;
            border-radius: 8px;
        }
        body.alignment-mode .alignment-lock-bar { display: flex !important; }
        .alignment-scale-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alignment-scale-row label {
            font-size: 14px;
            color: #f0f0f0;
        }
        .alignment-scale-row input[type="range"] {
            width: 120px;
            min-width: 80px;
            height: 24px;
            accent-color: #ffd700;
            cursor: pointer;
        }
        .alignment-lock-bar .btn {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9rem;
            background: rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.5);
            color: #ffd700;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .alignment-lock-bar .btn:hover {
            background: rgba(255,215,0,0.35);
            border-color: rgba(255,215,0,0.8);
        }

        /* Animated background (optional) */
        .projector-bg-animated {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse 120% 80% at 50% 50%, rgba(30,25,50,0.4) 0%, transparent 60%),
                        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(40,30,70,0.3) 0%, transparent 50%);
        }
        .projector-bg-fog {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
        }
        .projector-bg-fog-layer {
            position: absolute; width: 200%; height: 100%; top: 0; left: -50%;
            background: radial-gradient(ellipse 300px 80px at 20% 70%, rgba(100,80,140,0.08) 0%, transparent 70%);
            animation: projectorFogDrift 50s ease-in-out infinite alternate;
        }
        .projector-bg-fog-layer:nth-child(2) {
            background: radial-gradient(ellipse 350px 90px at 80% 60%, rgba(80,60,120,0.06) 0%, transparent 70%);
            animation: projectorFogDrift2 60s ease-in-out infinite alternate;
        }
        @keyframes projectorFogDrift {
            0% { transform: translateX(0); }
            100% { transform: translateX(5%); }
        }
        @keyframes projectorFogDrift2 {
            0% { transform: translateX(0); }
            100% { transform: translateX(-4%); }
        }
        .projector-bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        body:not(.projector-animated-bg) .projector-bg-animated,
        body:not(.projector-animated-bg) .projector-bg-fog,
        body:not(.projector-animated-bg) .projector-bg-canvas { display: none; }
        body.projector-animated-bg { background: #0a0c18; }
        .target-wrapper { position: relative; z-index: 2; }

        .modal .option-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .modal .option-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #ffd700; cursor: pointer; }
        .modal .option-row label { cursor: pointer; font-size: 0.95rem; color: #e0e0e0; margin: 0; }

        .dimensions-label {
            position: fixed; top: 12px; left: 12px; z-index: 50;
            font-size: 10px; color: #888; font-family: sans-serif;
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .m3-logo { width: 28px; bottom: 8px; right: 8px; }
            .dimensions-label { font-size: 9px; top: 8px; left: 8px; }
        }
    </style>
</head>
<body>
    <div class="projector-bg-animated" id="projectorBgAnimated"></div>
    <div class="projector-bg-fog" id="projectorBgFog">
        <div class="projector-bg-fog-layer"></div>
        <div class="projector-bg-fog-layer"></div>
    </div>
    <div class="projector-bg-canvas"><canvas id="projectorParticleCanvas"></canvas></div>
    <img src="assets/m3.png" alt="M3" class="m3-logo" id="logoBtn" title="Settings">
    <div class="dimensions-label">360×315mm · 14.25×12.5"</div>
    <div class="status-dot" id="status-dot" title="Waiting for game connection..."></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-wrap">
                <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
                <h3>Settings</h3>
                <div class="option-row">
                    <input type="checkbox" id="animated-background-cb" aria-describedby="animated-bg-hint">
                    <label for="animated-background-cb">Animated background</label>
                </div>
                <p id="animated-bg-hint" class="setting-hint" style="margin: -8px 0 16px; font-size: 0.85rem; color: rgba(255,255,255,0.6);">Subtle fog and ambient gradient. Uncheck for plain white.</p>
                <div class="btn-row">
                    <button class="btn" id="alignBtn">Alignment</button>
                    <button class="btn" id="resetAlignBtn">Reset alignment</button>
                </div>
            </div>
        </div>
    </div>

    <div class="alignment-hint" id="alignmentHint">Drag to move · Scroll or slider to scale</div>
    <div class="alignment-lock-bar" id="alignmentLockBar">
        <div class="alignment-scale-row">
            <label for="alignScaleSlider">Scale</label>
            <input type="range" id="alignScaleSlider" min="0.15" max="2.5" step="0.02" value="1" title="Scale target" />
        </div>
        <button class="btn" id="lockAlignBtn">Lock position</button>
        <button class="btn" id="cancelAlignBtn">Cancel</button>
    </div>

    <div class="target-wrapper" id="targetWrapper">
        <svg class="target-face" id="target-board" viewBox="0 0 400 460" preserveAspectRatio="xMidYMid meet" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#ffd700" flood-opacity="0.5" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
                    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#2ecc71" flood-opacity="0.5" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
                    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#f59e0b" flood-opacity="0.5" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
                    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feFlood flood-color="#f97316" flood-opacity="0.5" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
                    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feFlood flood-color="#ef4444" flood-opacity="0.6" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="shadow"/>
                    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <!-- Thick white perimeter border (in/out line) -->
            <path class="target-perimeter-border" fill="none" stroke="white" stroke-width="12" stroke-linejoin="round" d="M 200,2 L 7,119 L 2,346 L 200,458 L 398,346 L 393,119 Z"/>

            <!-- D20 faces from resources/d20_blank.html -->
            <g id="face-tl" class="highlight-zone" data-pair="10-17">
                <polygon class="face-shape d20-face" points="200,2 7,119 200,59"/>
            </g>
            <g id="face-tr" class="highlight-zone" data-pair="11-20">
                <polygon class="face-shape d20-face" points="200,2 200,59 393,119"/>
            </g>
            <g id="face-l" class="highlight-zone" data-pair="3-4">
                <polygon class="face-shape d20-face" points="7,119 66,316 200,59"/>
            </g>
            <g id="face-r" class="highlight-zone" data-pair="6-7">
                <polygon class="face-shape d20-face" points="200,59 334,316 393,119"/>
            </g>
            <g id="face-fl" class="highlight-zone" data-pair="12-15">
                <polygon class="face-shape d20-face-outer" points="7,119 2,346 66,316"/>
            </g>
            <g id="face-fr" class="highlight-zone" data-pair="9-14">
                <polygon class="face-shape d20-face-outer" points="393,119 334,316 398,346"/>
            </g>
            <g id="face-bl" class="highlight-zone" data-pair="13-18">
                <polygon class="face-shape d20-face-outer" points="66,316 2,346 200,458"/>
            </g>
            <g id="face-br" class="highlight-zone" data-pair="16-19">
                <polygon class="face-shape d20-face-outer" points="334,316 200,458 398,346"/>
            </g>
            <g id="face-bc" class="highlight-zone" data-pair="5-8">
                <polygon class="face-shape d20-face" points="66,316 200,458 334,316"/>
            </g>
            <g id="face-center" class="highlight-zone" data-pair="1-2">
                <polygon class="face-shape d20-face-center" points="200,59 66,316 334,316"/>
            </g>
        </svg>
    </div>

    <script>
    (function() {
        // ── Number-to-pair lookup ──
        // Each d20 number maps to its face's data-pair attribute
        const numberToPair = {
            1: '1-2',    2: '1-2',
            3: '3-4',    4: '3-4',
            5: '5-8',    8: '5-8',
            6: '6-7',    7: '6-7',
            9: '9-14',  14: '9-14',
           10: '10-17', 17: '10-17',
           11: '11-20', 20: '11-20',
           12: '12-15', 15: '12-15',
           13: '13-18', 18: '13-18',
           16: '16-19', 19: '16-19'
        };

        const allZones = document.querySelectorAll('.highlight-zone');
        const statusDot = document.getElementById('status-dot');

        function clearAll() {
            allZones.forEach(z => {
                z.classList.remove('active', 'claimed', 'aimed', 'multi-hit', 'triple-hit');
            });
        }

        function highlightRolls(rolls) {
            // Count how many rolls map to each pair
            const pairCounts = {};
            rolls.forEach(r => {
                const pair = numberToPair[r];
                if (pair) pairCounts[pair] = (pairCounts[pair] || 0) + 1;
            });
            allZones.forEach(z => {
                const pair = z.getAttribute('data-pair');
                const count = pairCounts[pair] || 0;
                if (count > 0) {
                    z.classList.add('active');
                    z.classList.toggle('multi-hit', count === 2);
                    z.classList.toggle('triple-hit', count >= 3);
                } else {
                    z.classList.remove('active', 'multi-hit', 'triple-hit');
                }
            });
        }

        function highlightClaimed(claimed) {
            // Count how many claimed hits map to each pair
            const pairCounts = {};
            claimed.forEach(r => {
                const pair = numberToPair[r];
                if (pair) pairCounts[pair] = (pairCounts[pair] || 0) + 1;
            });
            allZones.forEach(z => {
                const pair = z.getAttribute('data-pair');
                const count = pairCounts[pair] || 0;
                if (count > 0) {
                    z.classList.add('claimed');
                    z.classList.remove('active');
                    z.classList.toggle('multi-hit', count === 2);
                    z.classList.toggle('triple-hit', count >= 3);
                } else {
                    z.classList.remove('claimed', 'multi-hit', 'triple-hit');
                }
            });
        }

        function highlightAim(aimZone) {
            const aimPair = numberToPair[aimZone];
            allZones.forEach(z => {
                const pair = z.getAttribute('data-pair');
                z.classList.toggle('aimed', !!aimPair && pair === aimPair);
            });
        }

        // ── Alignment: scalable and draggable target (like Blade Aces) ──
        var ALIGN_STORAGE_KEY = 'daggerdie_projector_alignment';
        var targetWrapper = document.getElementById('targetWrapper');
        var modalOverlay = document.getElementById('modalOverlay');
        var logoBtn = document.getElementById('logoBtn');
        var modalClose = document.getElementById('modalClose');
        var alignBtn = document.getElementById('alignBtn');
        var lockAlignBtn = document.getElementById('lockAlignBtn');
        var cancelAlignBtn = document.getElementById('cancelAlignBtn');
        var resetAlignBtn = document.getElementById('resetAlignBtn');
        var alignScaleSlider = document.getElementById('alignScaleSlider');
        var alignDragState = { ox: 0, oy: 0, scale: 1, dragging: false, startX: 0, startY: 0, startOx: 0, startOy: 0 };
        var ALIGN_SCALE_MIN = 0.15, ALIGN_SCALE_MAX = 2.5, ALIGN_SCALE_STEP = 0.02;

        function applyTransform(x, y, s) {
            x = typeof x === 'number' ? x : 0;
            y = typeof y === 'number' ? y : 0;
            s = typeof s === 'number' && s > 0 ? s : 1;
            if (targetWrapper) targetWrapper.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(' + s + ')';
        }

        function parseTransform() {
            if (!targetWrapper) return { x: 0, y: 0, s: 1 };
            var t = targetWrapper.style.transform || '';
            var m = t.match(/translate\(([^,]+)px,\s*([^)]+)px\)/);
            var x = m ? parseFloat(m[1]) : 0;
            var y = m ? parseFloat(m[2]) : 0;
            var sm = t.match(/scale\(([^)]+)\)/);
            var s = sm ? parseFloat(sm[1]) : 1;
            if (isNaN(s) || s <= 0) s = 1;
            return { x: x, y: y, s: s };
        }

        function loadAlignment() {
            if (!targetWrapper) return;
            try {
                var raw = localStorage.getItem(ALIGN_STORAGE_KEY);
                if (raw) {
                    var o = JSON.parse(raw);
                    if (typeof o.x === 'number' && typeof o.y === 'number') {
                        var s = typeof o.s === 'number' && o.s > 0 ? o.s : 1;
                        applyTransform(o.x, o.y, s);
                        return;
                    }
                }
            } catch (e) {}
            applyTransform(0, 0, 1);
        }

        function saveAlignment() {
            try {
                var p = parseTransform();
                localStorage.setItem(ALIGN_STORAGE_KEY, JSON.stringify({ x: p.x, y: p.y, s: p.s }));
            } catch (e) {}
        }

        function openModal() {
            if (modalOverlay) modalOverlay.classList.add('open');
        }
        function closeModal() {
            if (modalOverlay) modalOverlay.classList.remove('open');
        }

        function onAlignWheel(e) {
            if (!document.body.classList.contains('alignment-mode')) return;
            var el = document.elementFromPoint(e.clientX, e.clientY);
            if (!el || !el.closest('.target-wrapper')) return;
            e.preventDefault();
            var p = parseTransform();
            var delta = e.deltaY > 0 ? -ALIGN_SCALE_STEP : ALIGN_SCALE_STEP;
            var s = Math.max(ALIGN_SCALE_MIN, Math.min(ALIGN_SCALE_MAX, p.s + delta));
            applyTransform(p.x, p.y, s);
            if (alignScaleSlider) alignScaleSlider.value = String(s);
        }

        function onAlignMouseDown(e) {
            if (!document.body.classList.contains('alignment-mode')) return;
            if (!e.target.closest('.target-wrapper')) return;
            var p = parseTransform();
            alignDragState.dragging = true;
            alignDragState.startX = e.clientX;
            alignDragState.startY = e.clientY;
            alignDragState.startOx = p.x;
            alignDragState.startOy = p.y;
            alignDragState.scale = p.s;
            document.addEventListener('mousemove', onAlignMouseMove);
            document.addEventListener('mouseup', onAlignMouseUp);
            e.preventDefault();
        }

        function onAlignMouseMove(e) {
            if (!alignDragState.dragging) return;
            var ox = alignDragState.startOx + (e.clientX - alignDragState.startX);
            var oy = alignDragState.startOy + (e.clientY - alignDragState.startY);
            applyTransform(Math.round(ox), Math.round(oy), alignDragState.scale);
        }

        function onAlignMouseUp() {
            alignDragState.dragging = false;
            document.removeEventListener('mousemove', onAlignMouseMove);
            document.removeEventListener('mouseup', onAlignMouseUp);
        }

        function onAlignScaleSliderInput() {
            if (!alignScaleSlider) return;
            var s = parseFloat(alignScaleSlider.value);
            if (isNaN(s) || s <= 0) return;
            s = Math.max(ALIGN_SCALE_MIN, Math.min(ALIGN_SCALE_MAX, s));
            var p = parseTransform();
            applyTransform(p.x, p.y, s);
        }

        function startAlignmentMode() {
            closeModal();
            document.body.classList.add('alignment-mode');
            var p = parseTransform();
            if (alignScaleSlider) { alignScaleSlider.value = String(p.s); alignScaleSlider.addEventListener('input', onAlignScaleSliderInput); }
            if (targetWrapper) targetWrapper.addEventListener('mousedown', onAlignMouseDown);
            document.addEventListener('wheel', onAlignWheel, { passive: false });
        }

        function exitAlignmentMode() {
            document.body.classList.remove('alignment-mode');
            if (targetWrapper) targetWrapper.removeEventListener('mousedown', onAlignMouseDown);
            document.removeEventListener('wheel', onAlignWheel);
            if (alignScaleSlider) alignScaleSlider.removeEventListener('input', onAlignScaleSliderInput);
            document.removeEventListener('mousemove', onAlignMouseMove);
            document.removeEventListener('mouseup', onAlignMouseUp);
        }

        function lockAlignment() {
            saveAlignment();
            exitAlignmentMode();
            loadAlignment();
        }

        function cancelAlignment() {
            exitAlignmentMode();
            loadAlignment();
        }

        function resetAlignment() {
            try { localStorage.removeItem(ALIGN_STORAGE_KEY); } catch (e) {}
            loadAlignment();
            closeModal();
        }

        var ANIMATED_BG_KEY = 'daggerdie_projector_animatedBackground';
        var animatedBgCb = document.getElementById('animated-background-cb');
        function applyAnimatedBg() {
            var on = animatedBgCb ? animatedBgCb.checked : (localStorage.getItem(ANIMATED_BG_KEY) === 'true');
            document.body.classList.toggle('projector-animated-bg', !!on);
        }
        if (animatedBgCb) {
            animatedBgCb.checked = localStorage.getItem(ANIMATED_BG_KEY) === 'true';
            animatedBgCb.addEventListener('change', function() {
                localStorage.setItem(ANIMATED_BG_KEY, String(animatedBgCb.checked));
                applyAnimatedBg();
            });
            applyAnimatedBg();
        }

        if (logoBtn) logoBtn.addEventListener('click', openModal);
        if (modalClose) modalClose.addEventListener('click', closeModal);
        if (modalOverlay) modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });
        if (alignBtn) alignBtn.addEventListener('click', startAlignmentMode);
        if (lockAlignBtn) lockAlignBtn.addEventListener('click', lockAlignment);
        if (cancelAlignBtn) cancelAlignBtn.addEventListener('click', cancelAlignment);
        if (resetAlignBtn) resetAlignBtn.addEventListener('click', resetAlignment);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.body.classList.contains('alignment-mode')) cancelAlignment();
                else closeModal();
            }
        });

        loadAlignment();

        // ── URL params for standalone testing (e.g. ?rolls=1,2&claimed=1,2 for multi-hit) ──
        (function initFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const rollsParam = params.get('rolls');
            const claimedParam = params.get('claimed');
            const aimParam = params.get('aim');
            if (rollsParam) {
                const rolls = rollsParam.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 20);
                const claimed = claimedParam ? claimedParam.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n >= 1 && n <= 20) : [];
                const aim = aimParam ? parseInt(aimParam, 10) : null;
                if (rolls.length) {
                    highlightRolls(rolls);
                    if (claimed.length) highlightClaimed(claimed);
                    if (aim) highlightAim(aim);
                    statusDot.classList.add('connected', 'active');
                }
            }
        })();

        // ── BroadcastChannel listener ──
        const channel = new BroadcastChannel('daggerdie-projector');

        channel.onmessage = function(event) {
            const msg = event.data;

            // Flash status dot on any message
            statusDot.classList.add('connected');

            if (msg.type === 'clear') {
                clearAll();
                statusDot.classList.remove('active');
                return;
            }

            if (msg.type === 'roll') {
                clearAll();
                highlightRolls(msg.rolls || []);
                highlightAim(msg.aim);
                statusDot.classList.add('active');
                return;
            }

            if (msg.type === 'update') {
                // Full state update: rolls + claimed
                clearAll();
                highlightRolls(msg.rolls || []);
                highlightClaimed(msg.claimed || []);
                highlightAim(msg.aim);
                statusDot.classList.add('active');
                return;
            }
        };
    })();
    </script>
    <script src="rpg-bg-canvas.js"></script>
</body>
</html>
